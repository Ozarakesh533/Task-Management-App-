<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Task Management</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="navbar-left">
    <div class="logo-mark">
      <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
        <rect x="2" y="2" width="7" height="7" rx="2" fill="currentColor"/>
        <rect x="11" y="2" width="7" height="7" rx="2" fill="currentColor" opacity="0.6"/>
        <rect x="2" y="11" width="7" height="7" rx="2" fill="currentColor" opacity="0.6"/>
        <rect x="11" y="11" width="7" height="7" rx="2" fill="currentColor" opacity="0.3"/>
      </svg>
    </div>
    <span class="logo-text">Task Management</span>
  </div>
  <div class="navbar-right" id="navbar-user" style="display:none">
    <button class="btn-icon" onclick="toggleDark()" title="Toggle dark mode" id="btn-dark">☀️</button>
    <button class="btn-icon" onclick="exportCSV()" title="Export CSV">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    </button>
    <div class="user-chip">
      <img id="user-photo" src="" alt="" width="24" height="24"/>
      <span id="user-name"></span>
    </div>
    <button class="btn-signout" onclick="signOut()">Sign out</button>
  </div>
</nav>

<div id="toast-wrap"></div>

<!-- LOGIN PAGE -->
<div id="login-page">
  <div class="login-card">
    <div class="login-logo-wrap">
      <div class="login-logo">
        <svg width="26" height="26" viewBox="0 0 20 20" fill="none">
          <rect x="2" y="2" width="7" height="7" rx="2" fill="white"/>
          <rect x="11" y="2" width="7" height="7" rx="2" fill="white" opacity="0.7"/>
          <rect x="2" y="11" width="7" height="7" rx="2" fill="white" opacity="0.7"/>
          <rect x="11" y="11" width="7" height="7" rx="2" fill="white" opacity="0.4"/>
        </svg>
      </div>
      <h1 class="login-brand-name">Task Management</h1>
    </div>
    <p class="login-tagline">Plan smarter. Execute faster. Deliver on time.</p>
    <button class="btn-google" onclick="signInWithGoogle()">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" width="18"/>
      Continue with Google
    </button>
  </div>
</div>

<!-- APP PAGE -->
<div id="app-page" style="display:none">

  <!-- STATS -->
  <div class="stats-row">
    <div class="stat-card stat-blue">
      <div class="stat-top"><span class="stat-label">Total</span><div class="stat-dot blue"></div></div>
      <div class="stat-num" id="stat-total">0</div>
      <div class="mini-bar"><div class="mini-fill blue" id="bar-total" style="width:100%"></div></div>
    </div>
    <div class="stat-card stat-green">
      <div class="stat-top"><span class="stat-label">Completed</span><div class="stat-dot green"></div></div>
      <div class="stat-num green" id="stat-done">0</div>
      <div class="mini-bar"><div class="mini-fill green" id="bar-done" style="width:0%"></div></div>
    </div>
    <div class="stat-card stat-amber">
      <div class="stat-top"><span class="stat-label">Pending</span><div class="stat-dot amber"></div></div>
      <div class="stat-num amber" id="stat-pending">0</div>
      <div class="mini-bar"><div class="mini-fill amber" id="bar-pending" style="width:0%"></div></div>
    </div>
    <div class="stat-card stat-red">
      <div class="stat-top"><span class="stat-label">Overdue</span><div class="stat-dot red"></div></div>
      <div class="stat-num red" id="stat-overdue">0</div>
      <div class="mini-bar"><div class="mini-fill red" id="bar-overdue" style="width:0%"></div></div>
    </div>
  </div>

  <!-- PROGRESS BAR -->
  <div class="progress-card">
    <div class="progress-info">
      <span id="progress-label">0 of 0 tasks complete</span>
      <span id="progress-pct" class="progress-pct">0%</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>

  <!-- ADD TASK CARD -->
  <div class="card" id="add-card">
    <div class="card-hdr">
      <span class="card-title">Add new task</span>
      <button class="btn-toggle-form" id="btn-toggle" onclick="toggleForm()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"/></svg>
      </button>
    </div>
    <div id="add-form">
      <div class="form-r1">
        <div class="fg span2">
          <label>Task description <span class="req">*</span></label>
          <input type="text" id="inp-task" placeholder="What needs to be done?" onkeypress="if(event.key==='Enter')addTask()"/>
        </div>
        <div class="fg">
          <label>Project</label>
          <input type="text" id="inp-project" placeholder="e.g. Marketing, Dev..." list="proj-list"/>
          <datalist id="proj-list"></datalist>
        </div>
        <div class="fg">
          <label>Priority</label>
          <select id="inp-priority">
            <option value="high">🔴 High</option>
            <option value="medium" selected>🟡 Medium</option>
            <option value="low">🟢 Low</option>
          </select>
        </div>
      </div>
      <div class="form-r2">
        <div class="fg">
          <label>Assign to</label>
          <input type="text" id="inp-assignto" placeholder="Name or email"/>
        </div>
        <div class="fg">
          <label>Assigned by</label>
          <input type="text" id="inp-assignedby" placeholder="Your name"/>
        </div>
        <div class="fg">
          <label>Assign date</label>
          <input type="date" id="inp-assigndate"/>
        </div>
        <div class="fg">
          <label>Due date <span class="req">*</span></label>
          <input type="date" id="inp-duedate"/>
        </div>
      </div>
      <div class="form-r3">
        <div class="fg span-full">
          <label>Notes</label>
          <input type="text" id="inp-notes" placeholder="Any additional details..."/>
        </div>
        <div class="fg-btn">
          <button class="btn-add" id="btn-add" onclick="addTask()">+ Add task</button>
        </div>
      </div>
    </div>
  </div>

  <!-- TASK TABLE CARD -->
  <div class="card">
    <div class="table-toolbar">
      <div class="tbar-left">
        <span class="card-title">Tasks</span>
        <div class="pill-row">
          <button class="pill active" onclick="setFilter('all',this)">All</button>
          <button class="pill" onclick="setFilter('pending',this)">Pending</button>
          <button class="pill" onclick="setFilter('done',this)">Done</button>
          <button class="pill" onclick="setFilter('overdue',this)">Overdue</button>
        </div>
      </div>
      <div class="tbar-right">
        <div class="search-wrap">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="inp-search" placeholder="Search tasks, assignee..." oninput="renderTable()"/>
        </div>
        <select id="filter-project" class="proj-select" onchange="renderTable()">
          <option value="">All projects</option>
        </select>
      </div>
    </div>
    <div id="table-container">
      <div class="loading-row"><div class="spinner"></div> Loading tasks...</div>
    </div>
  </div>

</div>

<!-- EDIT MODAL -->
<div id="edit-modal" class="modal-bg" style="display:none" onclick="closeModal(event)">
  <div class="modal-box">
    <div class="modal-hdr">
      <span class="modal-title">Edit task</span>
      <button class="btn-icon" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="edit-id"/>
      <div class="fg">
        <label>Task description</label>
        <input type="text" id="edit-task"/>
      </div>
      <div class="modal-row">
        <div class="fg">
          <label>Project</label>
          <input type="text" id="edit-project"/>
        </div>
        <div class="fg">
          <label>Priority</label>
          <select id="edit-priority">
            <option value="high">🔴 High</option>
            <option value="medium">🟡 Medium</option>
            <option value="low">🟢 Low</option>
          </select>
        </div>
      </div>
      <div class="modal-row">
        <div class="fg">
          <label>Assign to</label>
          <input type="text" id="edit-assignto"/>
        </div>
        <div class="fg">
          <label>Due date</label>
          <input type="date" id="edit-duedate"/>
        </div>
      </div>
      <div class="fg">
        <label>Notes</label>
        <textarea id="edit-notes" rows="3" placeholder="Any additional notes..."></textarea>
      </div>
    </div>
    <div class="modal-ftr">
      <button class="btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn-add" onclick="saveEdit()">Save changes</button>
    </div>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="js/app.js?v=3"></script>
<script src="js/tasks.js?v=3"></script>
<script src="js/ui.js?v=3"></script>
</body>
</html>
